<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=\, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .oval {
        height: 60px;
        width: 30px;
        background-color: red;
        border-radius: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      body {
        height: 100vh;
        display: flex;
        align-items: end;
        justify-content: center;
      }

      .circle {
        height: 10px;
        width: 10px;
        background-color: yellow;
        border-radius: 100%;
        position: absolute;
        animation-name: move;
        animation-duration: 2s;
        animation-timing-function: ease;
        animation-iteration-count: infinite;
      }
      @keyframes move {
        from {
          top: 10px;
        }
        to {
          top: 40px;
        }
      }
    </style>
  </head>
  <body>
    <div class="oval">
      <div class="circle"></div>
    </div>
  </body>
</html>
