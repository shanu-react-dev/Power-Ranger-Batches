<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colors in CSS</title>
    <style>
      h1 {
        color: blueviolet;
        color: rgb(0, 255, 76);
      }
      #heading2 {
        color: rgb(39, 96, 113);
        color: rgba(0, 0, 0, 0.55555551990231789);
        color: #123356;
        color: hsl(40, 100%, 50%);
        color: hsl(40, 500%, 100%);
      }
      input {
        color: red;
      }
      .user {
        color: green;
      }
      [placeholder="Enter your name"] {
        color: #459;
      }
      input:hover {
        color: green;
      }
      input::placeholder {
        color: blue;
      }

      [type="radio"] {
        accent-color: pink;
      }
    </style>
  </head>
