<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Complex Table</title>
  </head>
  <body>
    <!--! Quiet Place  -->
    <table border="">
      <caption>
        Complex Table
      </caption>
      <thead>
        <tr>
          <th>Sl. No.</th>
          <th>Items</th>
          <th>Price</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>1</td>
          <td>Shirt</td>
          <td rowspan="2" style="padding: 7px">2500</td>
        </tr>
        <tr>
          <td rowspan="2">2</td>
          <td rowspan="2">jeans</td>
        </tr>
        <tr>
          <td rowspan="2">2000</td>
        </tr>
        <tr>
          <td>3</td>
          <td>shoes</td>
        </tr>
      </tbody>

      <tfoot>
        <td colspan="2">Total</td>
        <td>4500</td>
      </tfoot>
    </table>
  </body>
</html>
