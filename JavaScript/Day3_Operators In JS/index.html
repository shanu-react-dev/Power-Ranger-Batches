<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Operators in JavaScript...</h1>

    <table border="" style="border-collapse: collapse">
      <caption>
        Addition Arithmetic Operator
      </caption>
      <thead>
        <tr>
          <th>FirstData</th>
          <th>SecondData</th>
          <th>Operator</th>
          <th>Result Data</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>number</td>
          <td>number</td>
          <td>Addition</td>
          <td>number</td>
        </tr>
        <tr>
          <td>number</td>
          <td>string</td>
          <td>addition</td>
          <td>string</td>
        </tr>
        <tr>
          <td colspan="4" style="color: red">
            Number datatype will be converted into string
          </td>
        </tr>
        <tr>
          <td>number</td>
          <td>boolean</td>
          <td>addition</td>
          <td>Number</td>
        </tr>
        <tr>
          <td colspan="4" style="color: red">
            Boolean will be converted into number datatype as 1 or 0
          </td>
        </tr>
        <tr>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
        </tr>
        <tr>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
        </tr>
      </tbody>
    </table>
    <script src="./script.js"></script>
  </body>
</html>
