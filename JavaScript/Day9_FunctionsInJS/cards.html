<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Basic Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css"
      rel="stylesheet"
    />
    <!-- Filled Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css"
      rel="stylesheet"
    />
    <!-- Brand Icons -->
    <link
      href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .main {
        height: 450px;
        width: 400px;
        background-color: blue;
        border-radius: 20px;
        padding: 9px;
        position: relative;
      }
      .vidCard {
        height: 60%;
        width: 99%;
        background-color: #fff;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .vidCard i {
        padding: 10px;
        font-size: 18px;
        background-color: blue;
        color: #fff;
        border-radius: 100%;
      }

      .main > p {
        font-size: 20px;
        margin-top: 30px;
        color: #fff;
      }

      .arrow {
        font-size: 50px;
        padding: 10px;
        border-radius: 100%;
        background-color: #fff;
        color: blue;
        position: absolute;
        bottom: 20px;
        right: 20px;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="vidCard">
        <div class="playIcon"><i class="bx bx-play"></i></div>
      </div>
      <p>
        Holly is a <b>senior executive</b> who got over
        <b>10 job interviews</b> and an offer she accepted
      </p>

      <i class="bx bx-arrow-up-right-stroke arrow"></i>
    </div>
  </body>
</html>
